[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn mcp_server.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
FHIR_BASE_URL = "https://hapi.fhir.org/baseR4"
# After first deploy, set MCP_BASE_URL to your Railway public URL in the dashboard:
# MCP_BASE_URL = "https://your-app.railway.app"
